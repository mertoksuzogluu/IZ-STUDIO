services:
  postgres:
    image: postgres:16-alpine
    container_name: iz-studio-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: izstudio
      POSTGRES_PASSWORD: izstudio123
      POSTGRES_DB: izstudio
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U izstudio"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

